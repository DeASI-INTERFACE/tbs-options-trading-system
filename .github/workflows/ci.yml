name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-check:
    name: Lint & Type Check (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

  lint-type-check-python:
    name: Lint & Type Check (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -e . --quiet 2>/dev/null || pip install -r requirements.txt --quiet 2>/dev/null || true

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    needs: lint-type-check-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e . --quiet 2>/dev/null || pip install -r requirements.txt --quiet 2>/dev/null || true

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=60

  test-node:
    name: Test (Node)
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present
