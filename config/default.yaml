trade_mode: paper

risk:
  max_daily_loss_pct: 0.02
  max_position_risk_pct: 0.01
  max_portfolio_delta: 0.30
  max_portfolio_vega: 0.50

execution:
  min_ev_threshold: 0.0
  min_confidence: 0.60

analytics:
